<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BLADE &amp; CO. — Барбершоп</title>
<meta name="description" content="Мужская стрижка, борода, королевское бритьё. Запишись онлайн." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="preconnect" href="https://images.unsplash.com" />

<!-- зерно/шум поверх всего -->
<div class="grain" aria-hidden="true"></div>
<!-- кастомный курсор (только устройства с мышью, см. CSS) -->
<div class="cursor" data-cursor aria-hidden="true"></div>

<!-- ШАПКА -->
<header class="nav">
  <a href="#top" class="nav__brand" data-brand></a>
  <nav class="nav__links">
    <a href="#services"><span>Услуги</span></a>
    <a href="#how"><span>Процесс</span></a>
    <a href="#reviews"><span>Отзывы</span></a>
    <a href="#book" class="nav__cta">Записаться</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero" id="top">
  <div class="hero__bg" data-parallax></div>
  <div class="hero__vignette"></div>
  <span class="hero__glyph" aria-hidden="true">✂</span>
  <div class="hero__stamp" aria-hidden="true" data-stamp></div>
  <div class="hero__inner">
    <p class="hero__eyebrow" data-reveal data-tagline></p>
    <h1 class="hero__title" data-reveal data-hero-title></h1>
    <p class="hero__sub" data-reveal data-hero-sub></p>
    <a href="#book" class="btn hero__cta" data-reveal data-hero-cta></a>
  </div>
  <div class="marquee hero__marquee" aria-hidden="true">
    <div class="marquee__track" data-marquee></div>
  </div>
</section>

<!-- СТАТЫ -->
<section class="stats">
  <div class="stats__inner" data-stats></div>
</section>

<!-- УСЛУГИ: гроссбух, не карточки -->
<section class="section section--services" id="services" data-num="01">
  <p class="kicker" data-reveal>Прайс — без сюрпризов</p>
  <h2 class="section__title" data-reveal>Услуги <em>и цены</em></h2>
  <div class="ledger" data-services></div>
</section>

<!-- КАК ЭТО РАБОТАЕТ -->
<section class="section section--paper" id="how" data-num="02">
  <span class="ghost-glyph ghost-glyph--no" aria-hidden="true">№</span>
  <p class="kicker" data-reveal>Три шага</p>
  <h2 class="section__title" data-reveal>Как <em>записаться</em></h2>
  <div class="steps" data-steps></div>
</section>

<!-- ОТЗЫВЫ -->
<section class="section section--bleed" id="reviews" data-num="03">
  <p class="kicker" data-reveal>Живые, не выдуманные</p>
  <h2 class="section__title" data-reveal>Что говорят <em>клиенты</em></h2>
  <div class="marquee marquee--reviews">
    <div class="marquee__track marquee__track--reviews" data-reviews></div>
  </div>
</section>

<!-- ФОРМА / КОНТАКТЫ -->
<section class="section section--book" id="book" data-num="04">
  <span class="ghost-glyph ghost-glyph--star" aria-hidden="true">★</span>
  <div class="book">
    <div class="book__info" data-reveal>
      <p class="kicker">Контакты</p>
      <h2 class="section__title">Запись</h2>
      <p class="book__lead">Оставь заявку — перезвоним и подберём время.</p>
      <ul class="book__contacts" data-contacts></ul>
    </div>

    <form class="form" data-form novalidate data-reveal>
      <label class="form__field">
        <span>Имя</span>
        <input name="name" type="text" required maxlength="80" placeholder="Как к вам обращаться" />
      </label>
      <label class="form__field">
        <span>Телефон или Telegram</span>
        <input name="contact" type="text" required maxlength="80" placeholder="+7… или @username" />
      </label>
      <label class="form__field">
        <span>Комментарий <em>(необязательно)</em></span>
        <textarea name="message" rows="3" maxlength="500" placeholder="Услуга, удобное время…"></textarea>
      </label>
      <button type="submit" class="btn form__submit">Отправить заявку</button>
      <p class="form__status" data-status role="status" aria-live="polite"></p>
    </form>
  </div>
</section>

<footer class="footer">
  <div class="footer__giant" data-brand aria-hidden="true"></div>
  <div class="footer__row">
    <span data-brand></span>
    <span class="footer__muted">Демо-лендинг · собран для портфолио</span>
  </div>
</footer>

<script type="module" src="main.js"></script>
